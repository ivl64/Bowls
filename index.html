<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#ffffff" media="(prefers-color-scheme:light)">
<meta name="theme-color" content="#181814" media="(prefers-color-scheme:dark)">
<title>Боулы</title>
<style>
/* ── variables ── */
:root{
  --bg:#fff;--bg2:#f5f4ef;--bg3:#eceae3;
  --c:#1b1b19;--c2:#58584f;--c3:#98978e;
  --brd:rgba(0,0,0,.09);
  --grn:#2c7d52;--grn-l:#e3f3eb;--grn-t:#1d5c3a;
  --r:12px;
}
@media(prefers-color-scheme:dark){
  :root{
    --bg:#181814;--bg2:#222220;--bg3:#2c2c28;
    --c:#f0ede4;--c2:#a09890;--c3:#60594e;
    --brd:rgba(255,255,255,.08);
    --grn:#3fa86e;--grn-l:#0d2e1c;--grn-t:#7dd4a8;
  }
}
/* ── reset ── */
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
  background:var(--bg);color:var(--c);font-size:14px;line-height:1.45}
button{font-family:inherit;cursor:pointer;border:none;background:none}
a{color:var(--grn);text-decoration:none}
a:hover{text-decoration:underline}
/* ── layout ── */
.wrap{max-width:640px;margin:0 auto;padding-bottom:40px}
.hdr{position:sticky;top:0;z-index:100;background:var(--bg);
  border-bottom:1px solid var(--brd);padding:0 16px}
.hdr-top{display:flex;align-items:center;justify-content:space-between;padding:12px 0 8px}
.app-title{font-size:17px;font-weight:700}
.lang-btn{padding:5px 14px;border-radius:20px;font-size:12px;font-weight:700;
  background:var(--bg3);color:var(--c2)}
.tabs{display:flex}
.tab{flex:1;padding:10px 0;text-align:center;font-size:13px;font-weight:600;
  color:var(--c3);border-bottom:2px solid transparent;transition:all .15s}
.tab.on{color:var(--grn);border-bottom-color:var(--grn)}
.view{display:none;padding:16px}
.view.on{display:block}
/* ── cards ── */
.card{background:var(--bg2);border:1px solid var(--brd);border-radius:var(--r);
  padding:14px;margin-bottom:12px}
.card-title{font-size:14px;font-weight:700;margin-bottom:2px}
.card-sub{font-size:12px;color:var(--c3);margin-bottom:8px}
/* ── macro chips ── */
.macro-row{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}
.mchip{background:var(--bg3);border-radius:8px;padding:4px 10px;
  font-size:11px;font-weight:600;color:var(--c2)}
/* ── prep cards ── */
.prep-card{background:var(--grn-l);border:1px solid var(--grn);
  border-radius:var(--r);padding:14px;margin-bottom:12px}
.prep-card .card-title{color:var(--grn-t)}
.prep-card .card-sub{color:var(--grn)}
.prep-steps{margin-top:8px;list-style:none}
.prep-steps li{padding:3px 0;font-size:12px;color:var(--c2)}
.prep-steps li::before{content:'• ';color:var(--grn)}
.prep-buy{margin-top:6px;margin-bottom:2px;font-size:11px;font-weight:700;
  text-transform:uppercase;letter-spacing:.4px;color:var(--grn-t)}
.shop-link-btn{display:inline-block;margin-top:10px;padding:7px 14px;
  border-radius:20px;background:var(--grn);color:#fff;font-size:12px;
  font-weight:600;cursor:pointer;border:none;font-family:inherit}
/* ── day card ── */
.day-card{background:var(--bg2);border:1px solid var(--brd);
  border-radius:var(--r);margin-bottom:12px;overflow:hidden}
.day-hdr{padding:12px 14px 8px;border-bottom:1px solid var(--brd)}
.day-name{font-size:15px;font-weight:700;margin-bottom:4px}
.grain-line{font-size:12px;color:var(--c2);margin-bottom:3px}
.grain-line b{color:var(--c)}
.veg-row{display:flex;gap:5px;flex-wrap:wrap;margin:5px 0 3px}
.vbadge{background:var(--grn-l);color:var(--grn-t);border-radius:6px;
  padding:2px 7px;font-size:11px;font-weight:600}
.thaw-note{font-size:11px;color:var(--c3);margin-top:2px}
/* ── meals grid ── */
.meals-grid{display:grid;grid-template-columns:1fr 1fr}
.mc{padding:10px 11px;border-right:1px solid var(--brd);border-bottom:1px solid var(--brd)}
.mc:nth-child(2n){border-right:none}
.mc:nth-last-child(-n+2){border-bottom:none}
.mc-label{font-size:10px;font-weight:700;text-transform:uppercase;
  letter-spacing:.5px;color:var(--c3);margin-bottom:4px}
.mc-grain{font-size:11px;color:var(--c2);margin-bottom:3px}
.prow{display:flex;align-items:flex-start;gap:4px;margin-bottom:3px}
.pb{display:inline-block;border-radius:5px;padding:2px 5px;
  font-size:10px;font-weight:700;white-space:nowrap;flex-shrink:0}
.pf{background:#E6F1FB;color:#0C447C}
.ps{background:#E1F5EE;color:#085041}
.pp{background:#FAEEDA;color:#633806}
.pm{background:#FAECE7;color:#4A1B0C}
@media(prefers-color-scheme:dark){
  .pf{background:#042C53;color:#85B7EB}
  .ps{background:#04342C;color:#5DCAA5}
  .pp{background:#412402;color:#EF9F27}
  .pm{background:#4A1B0C;color:#F0997B}
}
.pname{font-size:12px;font-weight:600;line-height:1.3}
.pamt{font-size:11px;color:var(--c2)}
.mc-dress{font-size:11px;color:var(--grn);font-weight:600;margin-top:3px}
.mc-fat{font-size:10px;color:var(--c3);margin-top:2px}
.mc-macro{font-size:10px;color:var(--c3);margin-top:3px;
  border-top:1px solid var(--brd);padding-top:3px}
/* snack cell */
.snack-mc{background:var(--grn-l)}
.snack-body{font-size:12px;color:var(--c2);line-height:1.55;margin:4px 0}
/* rest day snack cell */
.rest-mc{opacity:.45}
.rest-note{font-size:12px;color:var(--c3);font-style:italic;margin:4px 0}
/* ── collapsible ── */
.coll-wrap{background:var(--bg2);border:1px solid var(--brd);
  border-radius:var(--r);margin-bottom:12px;overflow:hidden}
.coll-hdr{padding:12px 14px;display:flex;justify-content:space-between;
  align-items:center;cursor:pointer}
.coll-title{font-size:13px;font-weight:700}
.coll-arr{font-size:12px;color:var(--c3);transition:transform .2s}
.coll-arr.open{transform:rotate(180deg)}
.coll-body{display:none;padding:0 14px 12px}
.coll-body.open{display:block}
.dress-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:4px}
.dcard{background:var(--bg3);border-radius:8px;padding:8px 10px}
.did{font-size:10px;font-weight:700;color:var(--grn);margin-bottom:2px}
.dtext{font-size:11px;color:var(--c2);line-height:1.4}
.fat-lines p{font-size:12px;color:var(--c2);line-height:1.6;margin-bottom:4px}
/* ── shopping ── */
.shop-bar{display:flex;gap:6px;margin-bottom:10px;align-items:center;flex-wrap:wrap}
.fbtn{padding:6px 14px;border-radius:20px;font-size:12px;font-weight:600;
  background:var(--bg3);color:var(--c2);border:1px solid var(--brd)}
.fbtn.on{background:var(--grn);color:#fff;border-color:var(--grn)}
.rst-btn{padding:6px 14px;border-radius:20px;font-size:12px;font-weight:600;
  background:var(--bg3);color:var(--c2);border:1px solid var(--brd);margin-left:auto}
.prog{font-size:12px;color:var(--c3);padding:2px 0 10px}
.cat-lbl{font-size:10px;font-weight:700;text-transform:uppercase;
  letter-spacing:.6px;color:var(--c3);padding:10px 0 3px}
.si{display:flex;align-items:center;gap:8px;
  padding:5px 0;border-bottom:1px solid var(--brd)}
.si:last-child{border-bottom:none}
.si input{width:18px;height:18px;min-width:18px;accent-color:var(--grn);
  flex-shrink:0;cursor:pointer}
.si-body{flex:1;min-width:0}
.si-row{display:flex;align-items:baseline;gap:6px;width:100%}
.si-name{font-size:13px;font-weight:600;flex:1;min-width:0;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.si-qty{font-size:12px;color:var(--c2);white-space:nowrap;flex-shrink:0}
.si-link{font-size:11px;color:var(--grn);white-space:nowrap;flex-shrink:0}
.si-note{font-size:10px;color:var(--c3);margin-top:1px;line-height:1.3}
.si.done .si-name{text-decoration:line-through;color:var(--c3)}
.si.done .si-qty{color:var(--c3)}
</style>
</head>

/* ── fat note helper ── */
function fatNote(mkey, fatType) {
  if (mkey === 'b') {
    return fatType === 'f'
      ? (lang==='ru' ? 'масло 5г + орехи 10г' : 'Öl 5g + Nüsse 10g')
      : (lang==='ru' ? 'авок. 50г · масло 8г · орехи 15г' : 'Avoc. 50g · Öl 8g · Nüsse 15g');
  }
  if (mkey === 'l') {
    return lang==='ru' ? 'авок. 75г · масло 10г · орехи 15г' : 'Avoc. 75g · Öl 10g · Nüsse 15g';
  }
  // dinner
  return fatType === 'f'
    ? (lang==='ru' ? 'масло 5г · орехи 10г' : 'Öl 5g · Nüsse 10g')
    : (lang==='ru' ? 'авок. 75г · масло 10г · орехи 10г' : 'Avoc. 75g · Öl 10g · Nüsse 10g');
}

/* ── meal cell builder ── */
function mealCell(mkey, meal, grainName, grainAmt, t) {
  var h = '<div class="mc">';
  h += '<div class="mc-label">'+t[mkey]+'</div>';
  h += '<div class="mc-grain">'+grainName+' '+grainAmt+'г</div>';
  h += '<div class="prow">';
  h += '<span class="pb '+meal.pt+'">'+t[meal.pt]+'</span>';
  h += '<div><div class="pname">'+meal[lang]+'</div><div class="pamt">'+meal.amt+'</div></div>';
  h += '</div>';
  h += '<div class="mc-dress">'+t.dressTxt+' '+meal.dr+'</div>';
  h += '<div class="mc-fat">+ '+fatNote(mkey, meal.fat)+'</div>';
  h += '<div class="mc-macro">'+t[mkey+'Macro']+'</div>';
  h += '</div>';
  return h;
}

/* ── render schedule ── */
function renderSched() {
  var t = T[lang];
  var h = '';

  // daily macro card
  h += '<div class="card">';
  h += '<div class="card-title">'+t.daily+'</div>';
  h += '<div class="macro-row" style="margin-top:6px">';
  h += '<span class="mchip" style="background:var(--grn-l);color:var(--grn-t)">'+t.trainLabel+': '+t.trainMacro+'</span>';
  h += '<span class="mchip">'+t.restLabel+': '+t.restMacro+'</span>';
  h += '</div>';
  h += '<div class="macro-row" style="margin-top:4px">';
  ['b','l','snack','d'].forEach(function(k){
    h += '<span class="mchip">'+t[k]+': '+t[k+'Macro']+'</span>';

  h += '</div></div>';

  // Saturday prep card
  h += '<div class="prep-card">';
  h += '<div class="card-title">'+t.satDay+'</div>';
  h += '<div class="card-sub">'+t.satSub+'</div>';
  h += '<ul class="prep-steps">';
  t.satSteps.forEach(function(s){h+='<li>'+s+'</li>';});

  // Sunday prep card
  h += '<div class="prep-card">';
  h += '<div class="card-title">'+t.sunDay+'</div>';
  h += '<div class="card-sub">'+t.sunSub+'</div>';
  h += '<ul class="prep-steps">';

  h += '</ul></div>';

  // day cards
  plan.forEach(function(day, idx) {
    var g = day.grain;
    var v = day.veg;
    var m = day.meals;

    // Wednesday prep card before Wed day card
    if (idx === 2) {
      h += '<div class="prep-card">';
      h += '<div class="card-title">'+t.wedDay+'</div>';
      h += '<div class="card-sub">'+t.wedSub+'</div>';

      h += '<ul class="prep-steps">';
      t.wedSteps.forEach(function(s){h+='<li>'+s+'</li>';});
      h += '</ul>';
      h += '<button class="shop-link-btn" onclick="jumpShop(\'wed\')">'+t.goWed+'</button>';
      h += '</div>';
    }

    var gn = g[lang];

    h += '<div class="day-card">';

    // day header
    h += '<div class="day-hdr">';
    h += '<div class="day-name">'+day.day[lang]+'</div>';
    h += '<div class="grain-line"><b>'+gn+'</b> &mdash; '+t.grainCook+' '+g.total+'г&ensp;';
    h += '<span style="color:var(--c3)">'+t.sB+':'+g.b+'г&thinsp;·&thinsp;'+t.sL+':'+g.l+'г&thinsp;·&thinsp;'+t.sD+':'+g.d+'г</span></div>';
    h += '<div class="veg-row">';
    h += '<span class="vbadge">'+v.g[lang]+'</span>';
    h += '<span class="vbadge">'+v.v1[lang]+'</span>';
    h += '<span class="vbadge">'+v.v2[lang]+'</span>';
    h += '</div>';
    h += '<div class="thaw-note">'+day.thaw[lang]+'</div>';
    h += '</div>';

    // meals 2×2 grid
    h += '<div class="meals-grid">';
    h += mealCell('b', m.b, gn, g.b, t);
    h += mealCell('l', m.l, gn, g.l, t);
    // snack — only on training days (Wed=idx2, Sun=idx6)

    if (isTraining) {
      h += '<div class="mc snack-mc">';

    h += '</div>'; // day-card

  h += '<p>'+t.fatLeanB+'</p>';
  h += '<p>'+t.fatLeanLD+'</p>';
  h += '</div></div></div>';

  document.getElementById('view-s').innerHTML = h;

/* ── render shopping ── */
function renderShop() {
  var t = T[lang];
  var items = shopData.filter(function(i){
    return shopFilter==='all' || i[5]===shopFilter;
  });
  var total = items.length;
  var done = items.filter(function(i){return !!chk[i[0]];}).length;

  var h = '';
  h += '<div class="shop-bar">';
  ['all','sat','wed'].forEach(function(f){
    h += '<button class="fbtn'+(shopFilter===f?' on':'')+'" onclick="setFilter(\''+f+'\')">'+t[f]+'</button>';
  });
  h += '<button class="rst-btn" onclick="resetChk()">'+t.reset+'</button>';
  h += '</div>';
  h += '<div class="prog" id="prog">'+done+' / '+total+' '+t.bought+'</div>';

  catOrder.forEach(function(cat) {
    var ci = items.filter(function(i){return i[1]===cat;});
    if (!ci.length) return;
    h += '<div class="cat-lbl">'+t[catKey[cat]]+'</div>';
    ci.forEach(function(item) {
      var id=item[0], isDone=!!chk[id];
      var name = lang==='ru' ? item[2] : item[3];
      var note = lang==='ru' ? item[7] : item[8];
      h += '<div class="si'+(isDone?' done':'')+'" id="si-'+id+'">';
      h += '<input type="checkbox" '+(isDone?'checked':'')+' onchange="togChk(\''+id+'\')">';
      h += '<div class="si-body">';
      h += '<div class="si-row">';
      h += '<span class="si-name">'+name+'</span>';
      h += '<span class="si-qty">'+item[4]+'</span>';
      h += '<a class="si-link" href="'+item[6]+'" target="_blank">REWE</a>';
      h += '</div>';
      if (note) h += '<div class="si-note">'+note+'</div>';
      h += '</div></div>';
    });
  });

  document.getElementById('view-h').innerHTML = h;
}

/* ── UI helpers ── */
function switchTab(tab) {
  var isSched = tab === 's';
  document.getElementById('view-s').classList.toggle('on', isSched);
  document.getElementById('view-h').classList.toggle('on', !isSched);
  document.getElementById('tab-s').classList.toggle('on', isSched);
  document.getElementById('tab-h').classList.toggle('on', !isSched);
  document.getElementById('tab-s').textContent = T[lang].sched;
  document.getElementById('tab-h').textContent = T[lang].shop;
  if (!isSched) renderShop();
}

function toggleLang() {
  lang = lang==='ru' ? 'de' : 'ru';
  localStorage.setItem('bowl-lang', lang);
  document.getElementById('lang-btn').textContent = lang==='ru' ? 'DE' : 'RU';
  document.getElementById('app-title').textContent = T[lang].appTitle;
  document.getElementById('tab-s').textContent = T[lang].sched;
  document.getElementById('tab-h').textContent = T[lang].shop;
  var isShop = document.getElementById('view-h').classList.contains('on');
  if (isShop) renderShop(); else renderSched();
}

function setFilter(f) {
  shopFilter = f;
  renderShop();
}

function resetChk() {
  chk = {};
  localStorage.setItem('bowl-chk', '{}');
  renderShop();
}

function togChk(id) {
  chk[id] = !chk[id];
  if (!chk[id]) delete chk[id];
  localStorage.setItem('bowl-chk', JSON.stringify(chk));
  var el = document.getElementById('si-'+id);
  if (el) el.classList.toggle('done', !!chk[id]);
  // update progress
  var items = shopData.filter(function(i){return shopFilter==='all'||i[5]===shopFilter;});
  var done = items.filter(function(i){return !!chk[i[0]];}).length;
  var p = document.getElementById('prog');
  if (p) p.textContent = done+' / '+items.length+' '+T[lang].bought;
}

function jumpShop(filter) {
  shopFilter = filter;
  switchTab('h');
}

function toggleColl(id) {
  var body = document.getElementById('body-'+id);
  var arr = document.getElementById('arr-'+id);
  var isOpen = body.classList.toggle('open');
  arr.classList.toggle('open', isOpen);
}

/* ── init ── */
document.getElementById('lang-btn').textContent = lang==='ru' ? 'DE' : 'RU';
document.getElementById('app-title').textContent = T[lang].appTitle;
document.getElementById('tab-s').textContent = T[lang].sched;
document.getElementById('tab-h').textContent = T[lang].shop;
renderSched();
</script>
</body>
</html>
